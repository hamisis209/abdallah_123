<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Password - Inclusive Learning</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="header">Inclusive Learning System</div>
    <div class="container">
        <h2>Recover Password</h2>
        <form id="recoverForm">
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <label for="username">Enter your Username or User ID:</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <button type="submit" class="btn" style="margin-top:18px;">Send Recovery Link</button>
        </form>
        <div class="success" id="successMsg" style="display:none; margin-top:18px;">If this account exists, a recovery link will be sent to your email.</div>
        <div class="error" id="errorMsg"></div>
        <div style="margin-top: 24px; text-align:center;">
            <a href="/login.html" style="color:#4f8cff; text-decoration:underline;">Back to Login</a>
        </div>
    </div>
    <div class="footer">&copy; 2026 Inclusive Learning System | NHM</div>
    <script>
    document.getElementById('recoverForm').onsubmit = async function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const res = await fetch('/api/recover', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username })
        });
        const data = await res.json();
        if (data.status === 'success') {
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('errorMsg').textContent = '';
        } else {
            document.getElementById('errorMsg').textContent = data.message || 'Recovery failed.';
            document.getElementById('successMsg').style.display = 'none';
        }
    };
    </script>
</body>
</html>
