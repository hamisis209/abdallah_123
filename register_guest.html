<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Registration - Inclusive Learning</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="header">Inclusive Learning System</div>
    <!-- Navigation bar removed as requested -->
    <div class="container">
        <h2>Guest Registration</h2>
        <form id="guestForm">
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <label for="username">Full Name:</label>
                <input type="text" id="username" name="username" required>
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required pattern="[0-9\-\+\s]{7,15}">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn" style="margin-top:18px;">Create Guest Account</button>
        </form>
        <button class="btn" id="backBtn" onclick="window.location.href='login.html'">Back to Login</button>
        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>
    </div>
    <div class="footer">&copy; 2026 Inclusive Learning System | NHM</div>
</body>
</html>
    <script>
        const guestForm = document.getElementById('guestForm');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const backBtn = document.getElementById('backBtn');

        guestForm.onsubmit = async function(e) {
            e.preventDefault();
                const username = guestForm.username.value.trim();
                const phone = guestForm.phone.value.trim();
                const password = guestForm.password.value;
                if (!username) {
                    errorMsg.textContent = 'Full name is required.';
                    successMsg.textContent = '';
                    return;
                }
                if (!phone) {
                    errorMsg.textContent = 'Phone number is required.';
                    successMsg.textContent = '';
                    return;
                }
                if (password.length < 4) {
                    errorMsg.textContent = 'Password must be at least 4 characters.';
                    successMsg.textContent = '';
                    return;
                }
                try {
                    const response = await fetch('/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, phone, password })
                    });
                    if (response.ok) {
                        errorMsg.textContent = '';
                        successMsg.textContent = 'Guest account created! Redirecting...';
                        setTimeout(function() {
                            window.location.href = '/';
                        }, 1200);
                    } else {
                        const data = await response.json();
                        errorMsg.textContent = data.message || 'Registration failed.';
                        successMsg.textContent = '';
                    }
                } catch (err) {
                    errorMsg.textContent = 'Server error. Please try again later.';
                    successMsg.textContent = '';
                }
        };

        backBtn.onclick = function() {
            window.location.href = 'login.html';
        };
    </script>
</body>
</html>
