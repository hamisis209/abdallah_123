<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Password - Inclusive Learning</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="header">Inclusive Learning System</div>
    <div class="container">
        <h2>Recover Password</h2>
        <form method="post" autocomplete="off">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn" style="margin-top:18px;">Send Recovery Link</button>
        </form>
        <a href="{% url 'login' %}" style="color:#4f8cff; text-decoration:underline;">Back to Login</a>
        {% if messages %}
            <div class="error" aria-live="polite">
                {% for message in messages %}
                    {{ message }}<br>
                {% endfor %}
            </div>
        {% endif %}
    </div>
</body>
</html>
