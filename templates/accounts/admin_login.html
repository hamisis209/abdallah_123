<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Admin Login - Inclusive Learning</title>
	<link rel="stylesheet" href="/static/style.css">
</head>
<body>
	<style>
		.aris-topbar {
			height: 52px;
			background: #1181c7;
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 0 20px;
			color: #fff;
			font-weight: 600;
		}
		.aris-brand {
			display: flex;
			align-items: center;
			gap: 10px;
			font-size: 1.1rem;
		}
		.aris-brand-mark {
			width: 28px;
			height: 28px;
			border-radius: 50%;
			background: radial-gradient(circle at 30% 30%, #33b6ff, #0b5c9a);
			display: inline-block;
		}
		.aris-bg {
			min-height: calc(100vh - 56px);
			background:
				radial-gradient(800px 400px at 20% 10%, rgba(255,255,255,0.6), rgba(255,255,255,0)),
				url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160' viewBox='0 0 160 160'><g fill='none' stroke='rgba(0,0,0,0.05)' stroke-width='2'><path d='M20 20h40v40H20z'/><circle cx='110' cy='40' r='18'/><path d='M20 120l40-20 40 20'/><path d='M90 100h50v40H90z'/></g></svg>") repeat,
				#f2f2f2;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 30px 16px;
		}
		.aris-card {
			width: min(380px, 92vw);
			background: #fff;
			border-radius: 6px;
			box-shadow: 0 12px 30px rgba(0,0,0,0.12);
			padding: 28px 26px;
			text-align: center;
		}
		.aris-crest {
			width: 90px;
			height: 90px;
			margin: 0 auto 12px;
			border-radius: 50%;
			background: #f7f7f7;
			border: 1px solid #e0e0e0;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 0.9rem;
			color: #999;
		}
		.aris-title {
			font-size: 1rem;
			margin: 0 0 4px;
			color: #2b2b2b;
		}
		.aris-subtitle {
			font-size: 0.8rem;
			color: #7a7a7a;
			margin-bottom: 16px;
		}
		.aris-input {
			width: 100%;
			border: 1px solid #d9d9d9;
			border-radius: 4px;
			padding: 10px 12px 10px 36px;
			margin-bottom: 10px;
			font-size: 0.95rem;
		}
		.aris-input-wrap {
			position: relative;
		}
		.aris-input-wrap .icon {
			position: absolute;
			left: 10px;
			top: 50%;
			transform: translateY(-50%);
			color: #9aa4b2;
			font-size: 0.9rem;
		}
		.aris-error {
			color: #e11d48;
			font-size: 0.8rem;
			text-align: left;
			margin: -6px 0 8px;
		}
		.aris-link {
			color: #1181c7;
			text-decoration: none;
			font-size: 0.85rem;
		}
		.aris-btn {
			width: 100%;
			background: #1181c7;
			border: none;
			color: #fff;
			padding: 10px 14px;
			border-radius: 4px;
			font-weight: 600;
			margin-top: 10px;
		}
	</style>
	<div class="aris-topbar">
		<div class="aris-brand">
			<span class="aris-brand-mark"></span>
			<span>Inclusive Learning System</span>
		</div>
		<span>Admin</span>
	</div>
	<div class="aris-bg">
		<div class="aris-card">
			<div class="aris-crest">ADMIN</div>
			<div class="aris-title">Admin Login</div>
			<div class="aris-subtitle">Administrator credentials</div>
			<form method="post" autocomplete="off">
				{% csrf_token %}
				<div class="aris-input-wrap">
					<span class="icon">👤</span>
					<input type="text" id="username" name="username" class="aris-input" placeholder="Admin username" required autofocus aria-label="Admin username">
				</div>
				<div class="aris-input-wrap">
					<span class="icon">🔒</span>
					<input type="password" id="password" name="password" class="aris-input" placeholder="Password" required aria-label="Password">
				</div>
				{% if messages %}
					<div class="aris-error" aria-live="polite">
						{% for message in messages %}
							{{ message }}
						{% endfor %}
					</div>
				{% endif %}
				<button type="submit" class="aris-btn">Login</button>
			</form>
			<div style="margin-top:12px;">
				<a href="{% url 'login' %}" class="aris-link">Back to User Login</a>
			</div>
		</div>
	</div>
</body>
</html>
