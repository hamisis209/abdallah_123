<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login - Inclusive Learning</title>
	<link rel="stylesheet" href="/static/style.css">
</head>
<body>
	<div class="header">Inclusive Learning System</div>
	<!-- Navigation bar removed as requested -->
	<div class="container">
		<h2>Login</h2>
		<form method="post" autocomplete="off">
			{% csrf_token %}
			<div style="display: flex; flex-direction: column; gap: 12px;">
				<label for="username">Username or User ID:</label>
				<input type="text" id="username" name="username" required autofocus aria-label="Admin Username or User ID">
				<label for="password">Password:</label>
				<input type="password" id="password" name="password" required aria-label="Password">
			</div>
			<button type="submit" class="btn" style="margin-top:18px;">Login</button>
			<div style="text-align:right; margin-top:0;">
				<a href="{% url 'recover_password' %}" style="color:#4f8cff; text-decoration:underline;">Forgot password?</a>
			</div>
		</form>
		{% if messages %}
			<div class="error" aria-live="polite">
				{% for message in messages %}
					{{ message }}<br>
				{% endfor %}
			</div>
		{% endif %}
		<div style="margin-top: 32px; text-align:center;">
			<div>New user? <a href="{% url 'register' %}" style="color:#ff9800; font-weight:bold; text-decoration:underline;">Register</a></div>
			<div>New guest? <a href="{% url 'register_guest' %}" style="color:#43a047; font-weight:bold; text-decoration:underline;">Register as Guest</a></div>
		</div>
	</div>
	<div class="footer">&copy; 2026 Inclusive Learning System | NHM</div>
	<script>
		const loginForm = document.getElementById('loginForm');
		const errorMsg = document.getElementById('errorMsg');
		loginForm.onsubmit = async function(e) {
			e.preventDefault();
			const username = loginForm.username.value.trim();
			const password = loginForm.password.value;
			if (username && password) {
				const res = await fetch('/api/login', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ username, password })
				});
				const data = await res.json();
				if (data.status === 'success') {
					window.location.href = '/';
				} else {
					errorMsg.textContent = data.message || 'Login failed.';
				}
			} else {
				errorMsg.textContent = 'Please enter both username and password.';
			}
		};
	</script>
</body>
</html>
